[[package]]
name = "wisper"
version = "0.1.0"
source = { virtual = "." }
dependencies = [
    { name = "anthropic" },
    { name = "deepgram-sdk" },
    { name = "fastapi" },
    { name = "google-genai" },
    { name = "groq" },
    { name = "httpx" },
    { name = "numpy" },
    { name = "openai" },
    { name = "pydantic-settings" },
    { name = "pynput" },
    { name = "python-dotenv" },
    { name = "python-multipart" },
    { name = "sounddevice" },
    { name = "uvicorn" },
    { name = "websockets" },
]

[package.optional-dependencies]
local = [
    { name = "faster-whisper" },
]
mlx = [
    { name = "mlx-whisper", marker = "platform_machine == 'arm64' and sys_platform == 'darwin'" },
]

[package.dev-dependencies]
dev = [
    { name = "pytest" },
    { name = "pytest-asyncio" },
]

[package.metadata]
